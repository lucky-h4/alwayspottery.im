<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Always Pottery</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --green:#2A3320;--green-mid:#4A5E35;--green-light:#7A8C5A;
    --parchment:#EDE5D4;--cream:#F8F4EC;
    --text:#1E2818;--text-muted:#5A5840;--border:#D0C8B4;--white:#FDFAF4;
  }
  body{font-family:Georgia,serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem}
  .nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:60px}
  .logo{font-size:1.3rem;color:var(--green);text-decoration:none}
  .logo span{color:var(--green-light);font-style:italic}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center}
  .inner{max-width:480px}
  .pot{margin:0 auto 2rem;width:120px;height:120px}
  .eyebrow{font-family:system-ui,sans-serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--green-light);margin-bottom:1rem}
  h1{font-size:2.2rem;color:var(--green);font-weight:400;margin-bottom:1rem;line-height:1.2}
  p{color:var(--text-muted);font-size:1rem;line-height:1.8;margin-bottom:2rem}
  .btn-primary{display:inline-block;background:var(--green-mid);color:var(--white);padding:0.8rem 2rem;border-radius:4px;text-decoration:none;font-family:system-ui,sans-serif;font-size:0.9rem;transition:background 0.2s;margin:0.25rem}
  .btn-primary:hover{background:var(--green)}
  .btn-outline{display:inline-block;background:transparent;color:var(--green-mid);border:1px solid var(--green-mid);padding:0.8rem 2rem;border-radius:4px;text-decoration:none;font-family:system-ui,sans-serif;font-size:0.9rem;transition:all 0.2s;margin:0.25rem}
  .btn-outline:hover{background:var(--green-mid);color:var(--white)}
  .btns{display:flex;flex-wrap:wrap;justify-content:center;gap:0.5rem}
  footer{background:var(--green);color:#8AA070;padding:1.5rem;text-align:center;font-family:system-ui,sans-serif;font-size:0.82rem}
  footer a{color:#B8CCA0;text-decoration:none}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">Always <span>Pottery</span></a>
  </div>
</nav>

<div class="main">
  <div class="inner">
    <div class="pot">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="100" rx="34" ry="8" fill="#4A5E35" opacity="0.3"/>
        <path d="M30 82 Q22 55 26 32 Q30 10 60 8 Q90 10 94 32 Q98 55 90 82 Q76 94 60 96 Q44 94 30 82Z" fill="#7A8C5A" opacity="0.7"/>
        <ellipse cx="60" cy="16" rx="20" ry="7" fill="#4A5E35" opacity="0.5"/>
        <path d="M38 48 Q60 42 82 48" stroke="#2A3320" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
        <text x="60" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#2A3320" opacity="0.5">?</text>
      </svg>
    </div>
    <p class="eyebrow">404 — Page not found</p>
    <h1>This piece has left the studio</h1>
    <p>The page you're looking for doesn't exist — it may have been moved, sold, or never fired in the first place.</p>
    <div class="btns">
      <a href="/" class="btn-primary">Back to home</a>
      <a href="/#gallery" class="btn-outline">View the gallery</a>
    </div>
  </div>
</div>

<footer>
  <a href="/">alwayspottery.im</a> &nbsp;·&nbsp; Handbuilt in Ballasalla, Isle of Man
</footer>

</body>
</html>
